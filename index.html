        (function(){
            document.documentElement.classList.add('theme-lock');
            var theme;
            var mq = window.matchMedia('(prefers-color-scheme: dark)');
            if (mq.media !== 'not all') {
                theme = mq.matches ? 'dark' : 'light';
            } else {
                var h = new Date().getHours();
                theme = (h >= 6 && h < 18) ? 'light' : 'dark';
            }
            document.documentElement.setAttribute('data-theme', theme);
            document.documentElement.style.colorScheme = theme;
            requestAnimationFrame(function(){
                requestAnimationFrame(function(){
                    document.documentElement.classList.remove('theme-lock');
                });
            });
        })();
    </script>

<!-- ==================== 内联脚本：设备检测与打字效果 ==================== -->
<script>
    // ==================== 设备检测与彩蛋切换功能 ====================
    (function() {
        var isPhone = window.innerWidth < 768;
        var isTablet = window.innerWidth >= 768 && window.innerWidth <= 1180 &&
                       ('ontouchstart' in window || navigator.maxTouchPoints > 0);
        var isDesktop = !isPhone && !isTablet;

        var greetingTitle = document.getElementById('greeting-title');
        var titleHi = greetingTitle.querySelector('.title-hi');
        var titleName = greetingTitle.querySelector('.title-name');
        var isAnimating = false;
        var currentMode = isDesktop ? 'studio' : (isTablet ? ((window.innerWidth > window.innerHeight) ? 'studio' : 'person') : 'person');

        function updateGreeting(mode) {
            if (mode === 'studio') {
                titleHi.textContent = 'Hi, We\'re';
                titleName.textContent = 'Ntarstudio';
            } else {
                titleHi.textContent = 'Hi, I\'m';
                titleName.textContent = 'Ntars';
            }
        }

        updateGreeting(currentMode);

        function animateSwitch(newMode) {
            if (isAnimating || newMode === currentMode) return;
            isAnimating = true;
            greetingTitle.classList.add('fade-out');
            greetingTitle.classList.remove('fade-in');
            setTimeout(function() {
                currentMode = newMode;
                updateGreeting(currentMode);
                greetingTitle.classList.remove('fade-out');
                greetingTitle.classList.add('fade-in');
                setTimeout(function() {
                    greetingTitle.classList.remove('fade-in');
                    isAnimating = false;
                }, 300);
            }, 300);
        }

        greetingTitle.addEventListener('click', function() {
            if (isTablet) return;
            animateSwitch(currentMode === 'studio' ? 'person' : 'studio');
        });

        function handleResize() {
            var newPhone = window.innerWidth < 768;
            var newTablet = window.innerWidth >= 768 && window.innerWidth <= 1180 &&
                            ('ontouchstart' in window || navigator.maxTouchPoints > 0);
            var newDesktop = !newPhone && !newTablet;

            if (newTablet && !isTablet) {
                isPhone = newPhone; isTablet = newTablet; isDesktop = newDesktop;
                animateSwitch((window.innerWidth > window.innerHeight) ? 'studio' : 'person');
                return;
            }
            if (!newTablet && isTablet) {
                isPhone = newPhone; isTablet = newTablet; isDesktop = newDesktop;
                animateSwitch(isDesktop ? 'studio' : 'person');
                return;
            }

            if (isTablet) {
                var newLandscape = window.innerWidth > window.innerHeight;
                animateSwitch(newLandscape ? 'studio' : 'person');
            }

            isPhone = newPhone; isTablet = newTablet; isDesktop = newDesktop;

            var themeMeta = document.querySelector('meta[name=theme-color]');
            if (themeMeta) {
                var theme = document.documentElement.getAttribute('data-theme');
                themeMeta.setAttribute('content', theme === 'dark' ? '#0E0E13' : '#E8EEFA');
            }
        }

        if (isTablet) {
            window.addEventListener('resize', handleResize);
            window.addEventListener('orientationchange', function() {
                setTimeout(handleResize, 200);
            });
        }

        window.addEventListener('resize', function() {
            var themeMeta = document.querySelector('meta[name=theme-color]');
            if (themeMeta) {
                var theme = document.documentElement.getAttribute('data-theme');
                themeMeta.setAttribute('content', theme === 'dark' ? '#0E0E13' : '#E8EEFA');
            }
        });
    })();

    // ==================== 打字效果（Typed.js） ====================
    var typedOptions = {
        strings: [
            ">_ Remember what is important ^1000",
            ">_ Forget what is painful ^1000",
        ],
        typeSpeed: 50,
        backSpeed: 20,
        startDelay: 300,
        loop: true,
        showCursor: false,
    };
    var typed = new Typed('#typed', typedOptions);
</script>

<!-- ==================== PWA / Service Worker 注册 ==================== -->
<script>
    // 注册 Service Worker 实现离线缓存加速
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
            navigator.serviceWorker.register('./sw.js')
                .then(function (reg) {
                    console.log('[PWA] Service Worker registered:', reg.scope);
                    // 监听 SW 更新
                    reg.addEventListener('updatefound', function () {
                        var newWorker = reg.installing;
                        if (!newWorker) return;
                        newWorker.addEventListener('statechange', function () {
                            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                console.log('[PWA] New version available, please refresh.');
                            }
                        });
                    });
                })
                .catch(function (err) {
                    console.log('[PWA] Service Worker registration failed:', err);
                });
        });
    }

    // ==================== PWA 安装提示（beforeinstallprompt） ====================
    // 监听浏览器原生 PWA 安装事件，允许用户将网页安装为桌面/主屏幕应用
    var deferredPrompt;
    window.addEventListener('beforeinstallprompt', function (e) {
        e.preventDefault();
        deferredPrompt = e;
        // Android Chrome / 部分桌面浏览器支持安装横幅
        // 此处预留自定义安装按钮逻辑，默认依赖浏览器原生 UI
        console.log('[PWA] Install prompt available');
    });

    // 检测是否已以 PWA 模式运行
    if (window.matchMedia('(display-mode: standalone)').matches) {
        console.log('[PWA] Running in standalone mode');
    }
</script>
