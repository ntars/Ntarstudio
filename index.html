<script>
    // 全局禁止复制选中文字
    document.addEventListener('copy', function(e) {
        e.preventDefault();
        return false;
    });
    
    document.addEventListener('selectstart', function(e) {
        e.preventDefault();
        return false;
    });
    
    // 禁止显示悬停链接URL（左下角）
    document.addEventListener('mouseover', function(e) {
        if (e.target.tagName === 'A') {
            e.target.setAttribute('data-href', e.target.href);
            e.target.removeAttribute('href');
        }
    });
    
    document.addEventListener('mouseout', function(e) {
        if (e.target.tagName === 'A' && e.target.hasAttribute('data-href')) {
            e.target.href = e.target.getAttribute('data-href');
            e.target.removeAttribute('data-href');
        }
    });
    
    // 点击时恢复链接功能
    document.addEventListener('click', function(e) {
        if (e.target.tagName === 'A' && e.target.hasAttribute('data-href')) {
            const href = e.target.getAttribute('data-href');
            window.open(href, e.target.target || '_self');
            e.preventDefault();
        }
    });
    
    // 设备检测与彩蛋切换功能
    (function() {
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || window.innerWidth <= 768;
        const greetingTitle = document.getElementById('greeting-title');
        const titleHi = greetingTitle.querySelector('.title-hi');
        const titleName = greetingTitle.querySelector('.title-name');
        
        // 默认显示：手机显示 "Hi, I'm Ntars"，电脑显示 "Hi, We're Ntarstudio"
        let isStudioMode = !isMobile; // 电脑默认为true，手机默认为false
        let isAnimating = false; // 防止动画期间重复点击
        
        function updateGreeting() {
            if (isStudioMode) {
                titleHi.textContent = 'Hi, We\'re';
                titleName.textContent = 'Ntarstudio';
            } else {
                titleHi.textContent = 'Hi, I\'m';
                titleName.textContent = 'Ntars';
            }
        }
        
        // 初始化显示
        updateGreeting();
        
        // 点击切换彩蛋（带动画）
        greetingTitle.addEventListener('click', function() {
            if (isAnimating) return; // 动画进行中则忽略点击
            isAnimating = true;
            
            // 第一步：淡出
            greetingTitle.classList.add('fade-out');
            greetingTitle.classList.remove('fade-in');
            
            // 等待淡出动画完成
            setTimeout(() => {
                // 第二步：切换文本
                isStudioMode = !isStudioMode;
                updateGreeting();
                
                // 第三步：淡入
                greetingTitle.classList.remove('fade-out');
                greetingTitle.classList.add('fade-in');
                
                // 等待淡入动画完成
                setTimeout(() => {
                    greetingTitle.classList.remove('fade-in');
                    isAnimating = false;
                }, 300);
            }, 300);
        });
    })();
    
    // 打字效果，感谢 typed.js: https://mattboldt.github.io/typed.js/docs/
    const options = {
        strings: [
            ">_ Remember what is important ^1000",
            ">_ Forget what is painful ^1000",
        ],
        typeSpeed: 50, // 打印速度
        backSpeed: 20, // 回退速度
        startDelay: 300, // 开始之前的延迟300毫秒
        loop: true, // 是否循环
        showCursor: false, // 不显示光标
    };
    const typed = new Typed('#typed', options);
</script>
